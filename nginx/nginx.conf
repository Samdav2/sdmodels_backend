events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend Upstream
    upstream backend {
        server backend:8000;
    }

    # HTTP Server - Redirects all traffic to HTTPS, or serves HTTP if SSL is disabled
    server {
        listen 80;
        server_name _; # Catch-all

        # Allow Let's Encrypt Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # If you don't have SSL yet, comment out the return 301 line below
        # and uncomment the location / block below it to serve HTTP directly.

        # Redirect to HTTPS
        # return 301 https://$host$request_uri;

        # Serve HTTP (Temporary before SSL is setup)
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS Server (Uncomment and configure once SSL certificates are available)
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com; # Replace with your domain

    #     ssl_certificate /etc/nginx/ssl/fullchain.pem; # Path inside container
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    #     # Recommended SSL settings
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    #     location / {
    #         proxy_pass http://backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
