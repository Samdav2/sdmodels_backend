<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Invitation - SDModels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0a0a0a; color: #ffffff; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%); border-radius: 16px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); padding: 40px 30px; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; color: #ffffff; }
        .content { padding: 40px 30px; }
        h1 { font-size: 28px; margin-bottom: 20px; color: #ffffff; }
        p { color: #a3a3a3; margin-bottom: 20px; font-size: 16px; }
        .community-card { background: #1a1a1a; border-radius: 12px; padding: 30px; margin: 30px 0; text-align: center; }
        .community-card h2 { color: #ffffff; font-size: 24px; margin-bottom: 10px; }
        .community-card p { color: #737373; font-size: 14px; }
        .button { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 20px 0; }
        .footer { background: #0a0a0a; padding: 30px; text-align: center; border-top: 1px solid #262626; }
        .footer p { color: #525252; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SDModels</div>
        </div>
        <div class="content">
            <h1>You're Invited! 🎉</h1>
            <p>Hi {{username}},</p>
            <p>{{inviter_username}} has invited you to join their community on SDModels.</p>
            <div class="community-card">
                <h2>{{community_name}}</h2>
                <p>{{community_description}}</p>
                <p style="margin-top: 15px; color: #a3a3a3;">{{member_count}} members</p>
            </div>
            <a href="{{community_url}}" class="button">Join Community</a>
        </div>
        <div class="footer">
            <p>© 2024 SDModels. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
