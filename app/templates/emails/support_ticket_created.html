<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket Created - SDModels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0a0a0a; color: #ffffff; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%); border-radius: 16px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); padding: 40px 30px; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; color: #ffffff; }
        .content { padding: 40px 30px; }
        h1 { font-size: 28px; margin-bottom: 20px; color: #ffffff; }
        p { color: #a3a3a3; margin-bottom: 20px; font-size: 16px; }
        .ticket-card { background: #1a1a1a; border-radius: 12px; padding: 30px; margin: 30px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #262626; }
        .detail-label { color: #737373; font-size: 14px; }
        .detail-value { color: #ffffff; font-weight: 600; }
        .button { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 20px 0; }
        .footer { background: #0a0a0a; padding: 30px; text-align: center; border-top: 1px solid #262626; }
        .footer p { color: #525252; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SDModels</div>
        </div>
        <div class="content">
            <h1>Support Ticket Created 🎫</h1>
            <p>Hi {{username}},</p>
            <p>We've received your support request. Our team will review it and respond within 24 hours.</p>
            <div class="ticket-card">
                <div class="detail-row">
                    <span class="detail-label">Ticket ID</span>
                    <span class="detail-value">#{{ticket_id}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Subject</span>
                    <span class="detail-value">{{subject}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Priority</span>
                    <span class="detail-value">{{priority}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value">{{status}}</span>
                </div>
            </div>
            <a href="{{ticket_url}}" class="button">View Ticket</a>
        </div>
        <div class="footer">
            <p>© 2024 SDModels. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
