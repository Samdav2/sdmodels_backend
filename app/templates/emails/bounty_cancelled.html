<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty Cancelled - SDModels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0a0a0a; color: #ffffff; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%); border-radius: 16px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 40px 30px; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; color: #ffffff; }
        .content { padding: 40px 30px; }
        h1 { font-size: 28px; margin-bottom: 20px; color: #ffffff; }
        p { color: #a3a3a3; margin-bottom: 20px; font-size: 16px; }
        .info-box { background: #7f1d1d; border-left: 4px solid #dc2626; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .info-box p { color: #fecaca; margin: 0; font-size: 14px; }
        .button { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 20px 0; }
        .footer { background: #0a0a0a; padding: 30px; text-align: center; border-top: 1px solid #262626; }
        .footer p { color: #525252; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SDModels</div>
        </div>
        <div class="content">
            <h1>Bounty Cancelled</h1>
            <p>Hi {{username}},</p>
            <p>The bounty "{{bounty_title}}" has been cancelled by the poster.</p>
            <div class="info-box">
                <p><strong>Reason:</strong> {{cancellation_reason}}</p>
            </div>
            <p>If you had funds held in escrow, they have been refunded to your wallet.</p>
            <a href="{{bounties_url}}" class="button">Browse Other Bounties</a>
        </div>
        <div class="footer">
            <p>© 2024 SDModels. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
